name: Bump version

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to validate, for example a PR branch name
        required: false
        default: ""
      pr_number:
        description: Pull request number to preview and comment on
        required: false
        default: ""
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Keep one preview per PR and one bump per branch; newer runs supersede stale results.
  group: version-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # This job may check out a contributor-controlled ref. Never expose repository
    # secrets here or persist state from this runner into a secret-bearing job.
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate workflows
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          "$(go env GOPATH)/bin/actionlint" .github/workflows/*.yml

      - name: Validate version script
        run: |
          bash -n scripts/bump-version.sh
          bash scripts/bump-version.sh --dry-run
          VERSION_BASE_REF=origin/main VERSION_HEAD_REF=HEAD scripts/bump-version.sh --report

  validate-deploy-key:
    # Deploy-key validation is deliberately isolated from arbitrary-ref validation.
    # Only the trusted workflow on main may load the write credential.
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Validate deploy key
        env:
          VERSION_BUMP_SSH_KEY: ${{ secrets.VERSION_BUMP_SSH_KEY }}
        run: |
          test -n "$VERSION_BUMP_SSH_KEY"
          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          key_file="$(mktemp)"
          normalized_key_file="$(mktemp)"
          printf '%s\n' "$VERSION_BUMP_SSH_KEY" | perl -pe 's/\\n/\n/g; s/\r//g' > "$normalized_key_file"

          if grep -q 'BEGIN .*PRIVATE KEY' "$normalized_key_file"; then
            cp "$normalized_key_file" "$key_file"
          elif ! printf '%s' "$VERSION_BUMP_SSH_KEY" | tr -d '\r\n[:space:]' | base64 --decode > "$key_file" 2>/dev/null; then
            echo "::error::VERSION_BUMP_SSH_KEY is not a raw, escaped, or base64-encoded private SSH key."
            exit 1
          fi

          chmod 600 "$key_file"
          if ! grep -q 'BEGIN .*PRIVATE KEY' "$key_file" || ! ssh-keygen -y -f "$key_file" >/dev/null; then
            echo "::error::VERSION_BUMP_SSH_KEY must contain the private deploy key, not the .pub key. Store the raw private key or its base64 encoding."
            exit 1
          fi

          ssh-add "$key_file"
          git remote set-url origin git@github.com:felipe0328/power_mac.git
          git ls-remote origin HEAD >/dev/null
          git push --dry-run origin HEAD:main

  preview:
    # pull_request_target gives fork PRs permission to comment. Checkout only trusted
    # main code and read PR commit subjects through the API; never fetch the PR ref.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' || inputs.pr_number != ''
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false

      - name: Calculate version preview
        id: preview
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::pr_number must be numeric."
            exit 1
          fi

          messages_file="${RUNNER_TEMP}/version-commit-messages.txt"
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/commits?per_page=100" \
            --jq '.[].commit.message | split("\n")[0]' > "$messages_file"

          chmod +x scripts/bump-version.sh
          VERSION_MESSAGES_FILE="$messages_file" \
            scripts/bump-version.sh --report >> "$GITHUB_OUTPUT"

      - name: Comment version preview
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGED: ${{ steps.preview.outputs.changed }}
          CURRENT_VERSION: ${{ steps.preview.outputs.current }}
          NEXT_VERSION: ${{ steps.preview.outputs.version }}
          BUMP_TYPE: ${{ steps.preview.outputs.bump_type }}
          REASON: ${{ steps.preview.outputs.reason }}
        run: |
          # Reuse one marked bot comment so every synchronization updates the preview
          # instead of adding another comment to the PR.
          marker="<!-- power-mac-version-preview -->"
          body_file="$(mktemp)"

          if [[ "$CHANGED" == "true" ]]; then
            {
              printf '%s\n' "$marker"
              printf '## Version preview\n\n'
              printf '| Current | Expected after merge | Bump |\n'
              printf '| --- | --- | --- |\n'
              printf "| \`%s\` | \`%s\` | \`%s\` |\n\n" "$CURRENT_VERSION" "$NEXT_VERSION" "$BUMP_TYPE"
              printf "This PR will trigger a version bump after it is merged into \`main\`.\n\n"
              printf '> %s.\n' "$REASON"
            } > "$body_file"
          else
            {
              printf '%s\n' "$marker"
              printf '## Version preview\n\n'
              printf '| Current | Expected after merge | Bump |\n'
              printf '| --- | --- | --- |\n'
              printf "| \`%s\` | \`%s\` | none |\n\n" "$CURRENT_VERSION" "$CURRENT_VERSION"
              printf "No version bump will be created after this PR is merged into \`main\`.\n\n"
              printf '> %s.\n' "$REASON"
            } > "$body_file"
          fi

          body="$(cat "$body_file")"
          echo "$body" >> "$GITHUB_STEP_SUMMARY"

          posted=false
          comments_file="$(mktemp)"
          if gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" > "$comments_file"; then
            comment_id="$(jq -r ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"${marker}\"))) | .id" "$comments_file" | tail -n 1)"

            if [[ -n "$comment_id" ]]; then
              gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" -f body="$body" >/dev/null \
                && posted=true \
                || echo "Could not update PR issue comment; trying PR review summary."
            else
              gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -f body="$body" >/dev/null \
                && posted=true \
                || echo "Could not create PR issue comment; trying PR review summary."
            fi
          else
            echo "Could not read PR comments; version preview was written to the job summary."
          fi

          if [[ "$posted" != true ]]; then
            reviews_file="$(mktemp)"
            if gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" > "$reviews_file"; then
              review_id="$(jq -r ".[] | select(.user.login == \"github-actions[bot]\" and ((.body // \"\") | contains(\"${marker}\"))) | .id" "$reviews_file" | tail -n 1)"

              if [[ -n "$review_id" ]]; then
                gh api --method PUT "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews/${review_id}" -f body="$body" >/dev/null \
                  || echo "Could not update PR review summary; version preview was written to the job summary."
              else
                gh api --method POST "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" -f event=COMMENT -f body="$body" >/dev/null \
                  || echo "Could not create PR review summary; version preview was written to the job summary."
              fi
            else
              echo "Could not read PR reviews; version preview was written to the job summary."
            fi
          fi

  bump:
    # The automated commit includes [skip version], preventing an infinite push loop.
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip version]')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure version bump deploy key
        env:
          VERSION_BUMP_SSH_KEY: ${{ secrets.VERSION_BUMP_SSH_KEY }}
        run: |
          test -n "$VERSION_BUMP_SSH_KEY"
          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          key_file="$(mktemp)"
          normalized_key_file="$(mktemp)"
          # Accept raw multiline keys, secrets containing literal \n sequences, and
          # base64-encoded keys to make GitHub secret entry less error-prone.
          printf '%s\n' "$VERSION_BUMP_SSH_KEY" | perl -pe 's/\\n/\n/g; s/\r//g' > "$normalized_key_file"

          if grep -q 'BEGIN .*PRIVATE KEY' "$normalized_key_file"; then
            cp "$normalized_key_file" "$key_file"
          elif ! printf '%s' "$VERSION_BUMP_SSH_KEY" | tr -d '\r\n[:space:]' | base64 --decode > "$key_file" 2>/dev/null; then
            echo "::error::VERSION_BUMP_SSH_KEY is not a raw, escaped, or base64-encoded private SSH key."
            exit 1
          fi

          chmod 600 "$key_file"
          if ! grep -q 'BEGIN .*PRIVATE KEY' "$key_file" || ! ssh-keygen -y -f "$key_file" >/dev/null; then
            echo "::error::VERSION_BUMP_SSH_KEY must contain the private deploy key, not the .pub key. Store the raw private key or its base64 encoding."
            exit 1
          fi

          ssh-add "$key_file"
          echo "SSH_AUTH_SOCK=${SSH_AUTH_SOCK}" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=${SSH_AGENT_PID}" >> "$GITHUB_ENV"
          git remote set-url origin git@github.com:felipe0328/power_mac.git
          git ls-remote origin HEAD >/dev/null

      - name: Bump version from conventional commits
        id: bump
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/bump-version.sh
          scripts/bump-version.sh
          if git diff --quiet VERSION README.md install.sh; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push version bump
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION README.md install.sh
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip version]"
          # Confirm the deploy key and ruleset bypass before attempting the real push.
          git push --dry-run origin HEAD:main
          git push origin HEAD:main
